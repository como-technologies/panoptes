# Base Security Monitoring Template
# Minimal Panoptes configuration for general-purpose security monitoring
#
# This template provides essential file integrity and access monitoring
# suitable for any Kubernetes workload. Use this as a starting point
# and customize based on your specific requirements.
#
# Covers:
# - User account and credential file monitoring
# - System binary integrity
# - SSH configuration protection
# - Kubernetes secrets access auditing
# - Suspicious tool execution detection
#
# Usage:
#   1. Label your pods: kubectl label pod <name> security.panoptes.io/monitored=true
#   2. Apply this template: kubectl apply -f base-security.yaml
#   3. Verify: kubectl get aw,jg -l panoptes.io/template
---
apiVersion: argus.como-technologies.io/v2
kind: ArgusWatcher
metadata:
  name: base-security-fim
  labels:
    panoptes.io/template: base-security
  annotations:
    panoptes.io/description: "Base Security File Integrity Monitoring"
spec:
  # Default selector - monitors pods with security label
  selector:
    matchLabels:
      security.panoptes.io/monitored: "true"

  subjects:
    # Critical system files - always monitor
    - paths:
        - /etc/passwd
        - /etc/shadow
        - /etc/group
        - /etc/gshadow
        - /etc/sudoers
      events:
        - modify
        - delete
        - create
        - attrib
      tags:
        severity: critical
        category: user-accounts

    # Sudoers directory
    - paths:
        - /etc/sudoers.d
      events:
        - all
      recursive: true
      tags:
        severity: critical
        category: sudo-config

    # SSH configuration
    - paths:
        - /etc/ssh
      events:
        - modify
        - create
        - delete
      recursive: true
      tags:
        severity: critical
        category: ssh-config

    # Root SSH keys
    - paths:
        - /root/.ssh
      events:
        - all
      recursive: true
      tags:
        severity: critical
        category: ssh-keys

    # System log integrity
    - paths:
        - /var/log
      events:
        - delete
        - modify
      recursive: true
      maxDepth: 2
      ignore:
        - "*.gz"
        - "*.old"
        - "*.[0-9]"
        - "lastlog"
        - "wtmp"
        - "btmp"
      tags:
        severity: high
        category: audit-logs

    # PAM authentication modules
    - paths:
        - /etc/pam.d
      events:
        - modify
        - create
        - delete
      recursive: true
      tags:
        severity: critical
        category: authentication

    # Cron jobs (persistence mechanism)
    - paths:
        - /etc/cron.d
        - /etc/crontab
        - /var/spool/cron
      events:
        - all
      recursive: true
      tags:
        severity: high
        category: scheduled-tasks

    # System services
    - paths:
        - /etc/systemd/system
        - /etc/init.d
      events:
        - modify
        - create
        - delete
      recursive: true
      maxDepth: 2
      tags:
        severity: high
        category: system-services

  containerRuntime: auto
  paused: false
  logFormat: json

---
apiVersion: janus.como-technologies.io/v2
kind: JanusGuard
metadata:
  name: base-security-access
  labels:
    panoptes.io/template: base-security
  annotations:
    panoptes.io/description: "Base Security Access Control"
spec:
  # Default selector - monitors pods with security label
  selector:
    matchLabels:
      security.panoptes.io/monitored: "true"

  subjects:
    # Protect shadow files - deny all access
    - deny:
        - /etc/shadow
        - /etc/gshadow
      events:
        - access
        - open
      defaultResponse: deny
      audit: true
      tags:
        severity: critical
        category: credential-access

    # Protect SSH private keys
    - deny:
        - /root/.ssh/id_*
        - /root/.ssh/authorized_keys
        - /home/*/.ssh/id_*
      events:
        - access
        - open
      defaultResponse: deny
      audit: true
      tags:
        severity: critical
        category: ssh-keys

    # Kubernetes secrets - allow owner only
    - deny:
        - /var/run/secrets/kubernetes.io
      events:
        - access
        - open
      autoAllowOwner: true
      defaultResponse: deny
      audit: true
      tags:
        severity: critical
        category: k8s-secrets

    # Audit suspicious tool usage
    # These tools are commonly used for exfiltration or lateral movement
    - deny:
        - /usr/bin/curl
        - /usr/bin/wget
        - /usr/bin/nc
        - /usr/bin/ncat
        - /usr/bin/netcat
        - /usr/bin/nmap
        - /usr/bin/socat
      allow: []
      events:
        - execute
      defaultResponse: audit
      audit: true
      tags:
        severity: high
        category: suspicious-tools

    # Audit package manager usage
    - deny:
        - /usr/bin/apt
        - /usr/bin/apt-get
        - /usr/bin/yum
        - /usr/bin/dnf
        - /usr/bin/apk
        - /usr/bin/pip
        - /usr/bin/pip3
        - /usr/bin/npm
      events:
        - execute
      defaultResponse: audit
      audit: true
      tags:
        severity: medium
        category: package-managers

  containerRuntime: auto
  # Start in audit-only mode for initial deployment
  # Change to true after validating behavior
  enforcing: false
  paused: false
  logFormat: json
