# Default preset for Panoptes Argus
# Standard deployment with recommended settings

controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

daemon:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  tolerations:
    - operator: Exists
      effect: NoSchedule

observability:
  prometheus:
    enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s

global:
  cluster:
    name: ""
    environment: ""
