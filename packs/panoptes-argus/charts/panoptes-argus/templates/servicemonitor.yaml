{{- if and .Values.observability.prometheus.enabled .Values.observability.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "panoptes-argus.fullname" . }}
  namespace: {{ .Values.observability.serviceMonitor.namespace | default .Release.Namespace }}
  labels:
    {{- include "panoptes-argus.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "panoptes-argus.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      interval: {{ .Values.observability.serviceMonitor.interval }}
      path: /metrics
{{- end }}
