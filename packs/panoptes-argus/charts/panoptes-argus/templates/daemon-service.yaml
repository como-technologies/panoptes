apiVersion: v1
kind: Service
metadata:
  name: {{ include "panoptes-argus.fullname" . }}-daemon
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panoptes-argus.daemon.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.observability.prometheus.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "panoptes-argus.daemon.selectorLabels" . | nindent 4 }}
