apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "panoptes-argus.fullname" . }}
  labels:
    {{- include "panoptes-argus.labels" . | nindent 4 }}
rules:
  # ArgusWatcher CRD management
  - apiGroups: ["argus.como-technologies.io"]
    resources: ["arguswatchers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["argus.como-technologies.io"]
    resources: ["arguswatchers/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["argus.como-technologies.io"]
    resources: ["arguswatchers/finalizers"]
    verbs: ["update"]
  # Pod watching for container resolution
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Node watching for daemon scheduling
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Events for status reporting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # ConfigMaps for leader election
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "panoptes-argus.fullname" . }}
  labels:
    {{- include "panoptes-argus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "panoptes-argus.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "panoptes-argus.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
