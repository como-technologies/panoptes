{{- if .Values.compliance.soc2.enabled }}
apiVersion: argus.como-technologies.io/v2
kind: ArgusWatcher
metadata:
  name: {{ include "panoptes.fullname" . }}-soc2-fim
  namespace: {{ .Values.compliance.soc2.namespace | default .Release.Namespace }}
  labels:
    {{- include "panoptes.labels" . | nindent 4 }}
    compliance: soc2
    panoptes.io/template: soc2-fim
  annotations:
    soc2/criteria: "CC7.1, CC7.2, CC7.3"
spec:
  selector:
    matchLabels:
      {{- toYaml .Values.compliance.soc2.podSelector | nindent 6 }}

  subjects:
    # CC7.2 - System Monitoring
    - paths:
        - /var/log
      events:
        - modify
        - delete
        - create
      recursive: true
      maxDepth: 5
      ignore:
        - "*.gz"
        - "*.old"
        - "*.[0-9]"
      tags:
        criteria: "CC7.2"
        severity: high
        category: audit-logs

    # CC6.1/CC6.2 - Logical Access Security
    - paths:
        - /etc/passwd
        - /etc/shadow
        - /etc/group
        - /etc/gshadow
        - /etc/sudoers
      events:
        - modify
        - delete
        - create
        - attrib
      tags:
        criteria: "CC6.1"
        severity: critical
        category: user-accounts

    - paths:
        - /etc/sudoers.d
        - /etc/pam.d
        - /etc/security
      events:
        - all
      recursive: true
      tags:
        criteria: "CC6.2"
        severity: critical
        category: access-control

    # CC7.1 - System Operations
    - paths:
        - /usr/bin
        - /usr/sbin
        - /usr/local/bin
        - /bin
        - /sbin
      events:
        - modify
        - create
        - delete
      tags:
        criteria: "CC7.1"
        severity: high
        category: system-binaries

    - paths:
        - /etc/ssh
        - /root/.ssh
        - /home/*/.ssh
      events:
        - all
      recursive: true
      tags:
        criteria: "CC6.1"
        severity: critical
        category: remote-access

    - paths:
        - /etc/systemd/system
        - /etc/init.d
        - /etc/cron.d
        - /etc/crontab
        - /var/spool/cron
      events:
        - all
      recursive: true
      maxDepth: 3
      tags:
        criteria: "CC7.1"
        severity: high
        category: system-services

    - paths:
        - /app/config
        - /etc/app
        - /opt/app
      events:
        - modify
        - create
        - delete
      recursive: true
      maxDepth: 3
      tags:
        criteria: "CC7.2"
        severity: medium
        category: app-config

    - paths:
        - /etc/ssl/certs
        - /etc/ssl/private
        - /etc/pki
      events:
        - all
      recursive: true
      tags:
        criteria: "CC6.1"
        severity: critical
        category: certificates

  containerRuntime: auto
  paused: false
  logFormat: json
---
apiVersion: janus.como-technologies.io/v2
kind: JanusGuard
metadata:
  name: {{ include "panoptes.fullname" . }}-soc2-access
  namespace: {{ .Values.compliance.soc2.namespace | default .Release.Namespace }}
  labels:
    {{- include "panoptes.labels" . | nindent 4 }}
    compliance: soc2
    panoptes.io/template: soc2-access
  annotations:
    soc2/criteria: "CC6.1, CC6.2, CC7.3"
spec:
  selector:
    matchLabels:
      {{- toYaml .Values.compliance.soc2.podSelector | nindent 6 }}

  subjects:
    # CC6.1 - Logical Access Security
    - deny:
        - /etc/shadow
        - /etc/gshadow
        - /root/.ssh/id_*
        - /root/.ssh/authorized_keys
      allow:
        - /etc/passwd
        - /etc/group
      events:
        - access
        - open
      defaultResponse: deny
      audit: true
      tags:
        criteria: "CC6.1"
        severity: critical
        category: credential-access

    # CC6.2 - Access Authorization
    - deny:
        - /var/run/secrets
      events:
        - access
        - open
      autoAllowOwner: true
      defaultResponse: deny
      audit: true
      tags:
        criteria: "CC6.2"
        severity: critical
        category: k8s-secrets

    - deny:
        - /usr/bin/curl
        - /usr/bin/wget
        - /usr/bin/nc
        - /usr/bin/ncat
        - /usr/bin/netcat
        - /usr/bin/base64
      events:
        - execute
      defaultResponse: audit
      audit: true
      tags:
        criteria: "CC7.3"
        severity: high
        category: suspicious-tools

    # CC7.3 - Incident Detection
    - allow:
        - /app/data
        - /var/lib/app
        - /data
      events:
        - access
        - open
        - modify
      audit: true
      tags:
        criteria: "CC7.3"
        severity: medium
        category: data-access

  containerRuntime: auto
  enforcing: {{ .Values.compliance.soc2.enforcing | default false }}
  paused: false
  logFormat: json
{{- end }}
