# GDPR Compliance Preset
# EU General Data Protection Regulation monitoring
#
# Articles covered:
# - Article 32: Security of processing (integrity and confidentiality)
# - Article 30: Records of processing activities
# - Article 33: Breach notification support (detection)
# - Article 5(1)(e): Storage limitation
#
# Usage:
#   1. Select this preset when creating a cluster profile
#   2. Label pods handling personal data: kubectl label pod <name> gdpr/scope=personal-data

components:
  argus:
    enabled: true
  janus:
    enabled: true
  dashboard:
    enabled: true

# Enable GDPR compliance templates
compliance:
  gdpr:
    enabled: true
    namespace: ""
    enforcing: false
    podSelector:
      gdpr/scope: "personal-data"

# Enhanced resources for compliance workloads
argus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

janus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

# Enhanced observability for GDPR audits
observability:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
  opentelemetry:
    enabled: true
  grafana:
    dashboards:
      enabled: true

# All alerting rules enabled
alerting:
  enabled: true
  rules:
    criticalFileModified:
      enabled: true
      severity: critical
    highEventRate:
      enabled: true
      threshold: 50
      severity: warning
    unauthorizedAccess:
      enabled: true
      severity: critical
