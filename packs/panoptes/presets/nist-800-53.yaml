# NIST 800-53 Compliance Preset
# Federal Information Security Controls (FISMA/FedRAMP)
#
# Controls covered:
# - SI-7: Software, firmware, and information integrity
# - SI-7(1): Integrity verification using cryptographic mechanisms
# - SI-7(2): Automated response to integrity violations
# - AU-2: Audit events - determine auditable events
# - AU-3: Content of audit records
# - AU-6: Audit review, analysis, and reporting
# - AC-6: Least privilege access control
#
# Usage:
#   1. Select this preset when creating a cluster profile
#   2. Label in-scope pods: kubectl label pod <name> nist-800-53/scope=moderate

components:
  argus:
    enabled: true
  janus:
    enabled: true
  dashboard:
    enabled: true

# Enable NIST 800-53 compliance templates
compliance:
  nist80053:
    enabled: true
    namespace: ""
    enforcing: false
    podSelector:
      nist-800-53/scope: "moderate"

# Enhanced resources for compliance workloads
argus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

janus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

# Enhanced observability for federal audits
observability:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
  opentelemetry:
    enabled: true
  grafana:
    dashboards:
      enabled: true

# All alerting rules enabled
alerting:
  enabled: true
  rules:
    criticalFileModified:
      enabled: true
      severity: critical
    highEventRate:
      enabled: true
      threshold: 50
      severity: warning
    unauthorizedAccess:
      enabled: true
      severity: critical
