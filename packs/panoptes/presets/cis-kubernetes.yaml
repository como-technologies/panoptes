# CIS Kubernetes Benchmark Preset
# CIS Kubernetes Benchmark v1.8 compliance monitoring
#
# Sections covered:
# - 1.1.x: Control plane configuration files
# - 1.2.x: API server configuration
# - 4.1.x: Worker node configuration files
# - 4.2.x: Kubelet configuration
# - 5.1.x: RBAC and service accounts
# - 5.4.x: Host paths and runtime sockets
#
# Usage:
#   1. Select this preset when creating a cluster profile
#   2. Label monitoring pods: kubectl label pod <name> cis/scope=kubernetes-audit

components:
  argus:
    enabled: true
  janus:
    enabled: true
  dashboard:
    enabled: true

# Enable CIS Kubernetes compliance templates
compliance:
  cisKubernetes:
    enabled: true
    namespace: ""
    enforcing: true  # Recommended for runtime socket protection
    podSelector:
      cis/scope: "kubernetes-audit"

# Enhanced resources for compliance workloads
argus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

janus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

# Enhanced observability
observability:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
  opentelemetry:
    enabled: true
  grafana:
    dashboards:
      enabled: true

# All alerting rules enabled
alerting:
  enabled: true
  rules:
    criticalFileModified:
      enabled: true
      severity: critical
    highEventRate:
      enabled: true
      threshold: 50
      severity: warning
    unauthorizedAccess:
      enabled: true
      severity: critical
