# SOC 2 Compliance Preset
# SOC 2 Type II Trust Services Criteria monitoring
#
# Criteria covered:
# - CC6.1: Logical Access Security
# - CC6.2: Access Authorization
# - CC6.3: Access Removal
# - CC7.1: System Operations
# - CC7.2: System Monitoring
# - CC7.3: Incident Detection
#
# Usage:
#   1. Select this preset when creating a cluster profile
#   2. Label in-scope pods: kubectl label pod <name> soc2/scope=in-scope

components:
  argus:
    enabled: true
  janus:
    enabled: true
  dashboard:
    enabled: true

# Enable SOC 2 compliance templates
compliance:
  soc2:
    enabled: true
    namespace: ""
    enforcing: false
    podSelector:
      soc2/scope: "in-scope"

# Enhanced resources for compliance workloads
argus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

janus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

# Enhanced observability for SOC 2 audits
observability:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
  opentelemetry:
    enabled: true
  grafana:
    dashboards:
      enabled: true

# All alerting rules enabled
alerting:
  enabled: true
  rules:
    criticalFileModified:
      enabled: true
      severity: critical
    highEventRate:
      enabled: true
      threshold: 50
      severity: warning
    unauthorizedAccess:
      enabled: true
      severity: critical
