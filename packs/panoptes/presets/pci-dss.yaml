# PCI-DSS Compliance Preset
# Payment Card Industry Data Security Standard monitoring
#
# Requirements covered:
# - 10.5.5: File integrity monitoring on logs
# - 10.2.x: Audit trail logging
# - 7.1: Access control enforcement
# - 11.5: Change detection on critical files
#
# Usage:
#   1. Select this preset when creating a cluster profile
#   2. Label in-scope pods: kubectl label pod <name> pci-dss/scope=in-scope

components:
  argus:
    enabled: true
  janus:
    enabled: true
  dashboard:
    enabled: true

# Enable PCI-DSS compliance templates
compliance:
  pciDss:
    enabled: true
    namespace: ""
    enforcing: false
    podSelector:
      pci-dss/scope: "in-scope"

# Enhanced resources for compliance workloads
argus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

janus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

# Enhanced observability for PCI audits
observability:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
  opentelemetry:
    enabled: true
  grafana:
    dashboards:
      enabled: true

# All alerting rules enabled
alerting:
  enabled: true
  rules:
    criticalFileModified:
      enabled: true
      severity: critical
    highEventRate:
      enabled: true
      threshold: 50
      severity: warning
    unauthorizedAccess:
      enabled: true
      severity: critical
