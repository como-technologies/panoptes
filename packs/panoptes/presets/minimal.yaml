# Minimal preset - Argus only, no dashboard
# Use for lightweight FIM-only deployments

components:
  argus:
    enabled: true
  janus:
    enabled: false
  dashboard:
    enabled: false

# Minimal resources
argus:
  controller:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  daemon:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

# Basic observability
observability:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: false  # Disable if Prometheus not installed
  grafana:
    dashboards:
      enabled: false

alerting:
  enabled: false
