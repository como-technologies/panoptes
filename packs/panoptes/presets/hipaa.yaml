# HIPAA Compliance Preset
# Health Insurance Portability and Accountability Act monitoring
#
# Requirements covered:
# - 164.312(b): Audit Controls - Record and examine activity
# - 164.312(c)(1): Data Integrity - Protect ePHI from improper alteration
# - 164.312(d): Person/Entity Authentication - Verify identity
# - 164.308(a)(1): Security Management Process
#
# Usage:
#   1. Select this preset when creating a cluster profile
#   2. Label ePHI-handling pods: kubectl label pod <name> hipaa/scope=ephi

components:
  argus:
    enabled: true
  janus:
    enabled: true
  dashboard:
    enabled: true

# Enable HIPAA compliance templates
compliance:
  hipaa:
    enabled: true
    namespace: ""
    enforcing: false
    podSelector:
      hipaa/scope: "ephi"

# Enhanced resources for compliance workloads
argus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

janus:
  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
  daemon:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

# Enhanced observability for HIPAA audits
observability:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
  opentelemetry:
    enabled: true
  grafana:
    dashboards:
      enabled: true

# All alerting rules enabled
alerting:
  enabled: true
  rules:
    criticalFileModified:
      enabled: true
      severity: critical
    highEventRate:
      enabled: true
      threshold: 50
      severity: warning
    unauthorizedAccess:
      enabled: true
      severity: critical
