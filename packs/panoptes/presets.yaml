# Panoptes Spectro Cloud Palette Presets
# These presets appear in the Palette UI when configuring the pack.
# Presets in the same group are mutually exclusive.
#
# Groups:
#   - "Deployment Profile": Controls which components are deployed and resource sizing
#   - "Compliance Framework": Selects which compliance monitoring templates are activated

presets:
  # ============================================================
  # Deployment Profile presets (mutually exclusive)
  # ============================================================

  - name: "default"
    displayName: "Standard Deployment"
    group: "Deployment Profile"
    remove:
      - "components.janus.enabled"
      - "components.dashboard.enabled"
    add: |
      components:
        argus:
          enabled: true
        janus:
          enabled: true
        dashboard:
          enabled: true
      observability:
        prometheus:
          enabled: true
          serviceMonitor:
            enabled: true
        grafana:
          dashboards:
            enabled: true
      alerting:
        enabled: true

  - name: "minimal"
    displayName: "Minimal (FIM Only)"
    group: "Deployment Profile"
    remove:
      - "janus"
      - "dashboard"
      - "observability.opentelemetry"
      - "observability.grafana"
      - "alerting"
    add: |
      components:
        argus:
          enabled: true
        janus:
          enabled: false
        dashboard:
          enabled: false
      argus:
        controller:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        daemon:
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      observability:
        prometheus:
          enabled: true
          serviceMonitor:
            enabled: false
        grafana:
          dashboards:
            enabled: false
      alerting:
        enabled: false

  # ============================================================
  # Compliance Framework presets (mutually exclusive)
  # ============================================================

  - name: "no-compliance"
    displayName: "No Compliance Templates"
    group: "Compliance Framework"
    remove:
      - "compliance"
    add: |
      compliance:
        baseSecurity:
          enabled: false
        pciDss:
          enabled: false
        hipaa:
          enabled: false
        soc2:
          enabled: false
        cisKubernetes:
          enabled: false
        nist80053:
          enabled: false
        gdpr:
          enabled: false

  - name: "pci-dss"
    displayName: "PCI-DSS 4.0"
    group: "Compliance Framework"
    remove:
      - "compliance"
    add: |
      compliance:
        baseSecurity:
          enabled: false
        pciDss:
          enabled: true
          namespace: ""
          enforcing: false
          podSelector:
            pci-dss/scope: "in-scope"
        hipaa:
          enabled: false
        soc2:
          enabled: false
        cisKubernetes:
          enabled: false
        nist80053:
          enabled: false
        gdpr:
          enabled: false
      argus:
        controller:
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
        daemon:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      janus:
        controller:
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
        daemon:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      observability:
        prometheus:
          serviceMonitor:
            enabled: true
            interval: 15s
        opentelemetry:
          enabled: true
      alerting:
        enabled: true
        rules:
          criticalFileModified:
            enabled: true
            severity: critical
          highEventRate:
            enabled: true
            threshold: 50
            severity: warning
          unauthorizedAccess:
            enabled: true
            severity: critical

