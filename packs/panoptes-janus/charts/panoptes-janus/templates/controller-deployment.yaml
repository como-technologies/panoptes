apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "panoptes-janus.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panoptes-janus.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "panoptes-janus.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "panoptes-janus.controller.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "panoptes-janus.serviceAccountName" . }}
      {{- with .Values.controller.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          args:
            - --leader-elect
            - --metrics-bind-address=:{{ .Values.observability.prometheus.port }}
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: {{ .Values.observability.prometheus.port }}
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          env:
            - name: WATCH_NAMESPACE
              value: ""
            - name: DEFAULT_ENFORCING
              value: {{ .Values.enforcement.enabled | quote }}
            {{- if .Values.global.cluster.name }}
            - name: PANOPTES_CLUSTER_NAME
              value: {{ .Values.global.cluster.name | quote }}
            {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
