{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "panoptes-janus.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panoptes-janus.controller.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "panoptes-janus.controller.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus metrics scraping
    - ports:
        - port: {{ .Values.observability.prometheus.port }}
          protocol: TCP
    # Health probes from kubelet
    - ports:
        - port: 8081
          protocol: TCP
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Kubernetes API server (CRD watch, leader election)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # gRPC to janusd daemons
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              {{- include "panoptes-janus.daemon.selectorLabels" . | nindent 14 }}
{{- end }}
