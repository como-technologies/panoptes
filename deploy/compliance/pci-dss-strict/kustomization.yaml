# Strict overlay for PCI-DSS compliance template
# Enables enforcing mode (violations are blocked, not just logged)
#
# Usage:
#   kubectl apply -k deploy/compliance/pci-dss-strict/
#
# WARNING: Test in audit mode first (pci-dss/) before enabling strict mode.
# Blocked operations will interrupt workloads.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../pci-dss

patches:
  - path: patches/janusguard-strict.yaml
