# Strict overlay for NIST 800-53 compliance template
# Enables enforcing mode (violations are blocked, not just logged)
#
# Usage:
#   kubectl apply -k deploy/compliance/nist-800-53-strict/
#
# WARNING: Test in audit mode first (nist-800-53/) before enabling strict mode.
# Blocked operations will interrupt workloads.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../nist-800-53

patches:
  - path: patches/janusguard-strict.yaml
