# Strict overlay for GDPR compliance template
# Enables enforcing mode (violations are blocked, not just logged)
#
# Usage:
#   kubectl apply -k deploy/compliance/gdpr-strict/
#
# WARNING: Test in audit mode first (gdpr/) before enabling strict mode.
# Blocked operations will interrupt workloads.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../gdpr

patches:
  - path: patches/janusguard-strict.yaml
