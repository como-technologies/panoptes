# Strict overlay for SOC 2 compliance template
# Enables enforcing mode (violations are blocked, not just logged)
#
# Usage:
#   kubectl apply -k deploy/compliance/soc2-strict/
#
# WARNING: Test in audit mode first (soc2/) before enabling strict mode.
# Blocked operations will interrupt workloads.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../soc2

patches:
  - path: patches/janusguard-strict.yaml
