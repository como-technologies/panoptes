# NIST 800-53 File Integrity Monitoring
# Controls: SI-7, SI-7(1), SI-7(2), AU-2, AU-3
apiVersion: argus.como-technologies.io/v2
kind: ArgusWatcher
metadata:
  name: nist-fim
  labels:
    compliance: nist-800-53
    panoptes.io/template: nist-fim
  annotations:
    panoptes.io/description: "NIST 800-53 File Integrity Monitoring"
    nist/controls: "SI-7, SI-7(1), SI-7(2)"
spec:
  selector:
    matchLabels:
      nist-800-53/scope: "moderate"

  subjects:
    # SI-7: System binaries integrity
    - paths:
        - /usr/bin
        - /usr/sbin
        - /bin
        - /sbin
      events:
        - modify
        - create
        - delete
        - attrib
      recursive: true
      ignore:
        - "*.pyc"
        - "__pycache__"
      tags:
        control: "SI-7"
        severity: critical
        category: system-binaries

    # SI-7(1): User account files
    - paths:
        - /etc/passwd
        - /etc/shadow
        - /etc/group
        - /etc/gshadow
        - /etc/sudoers
      events:
        - modify
        - delete
        - attrib
      tags:
        control: "SI-7(1)"
        severity: critical
        category: user-accounts

    # SI-7: Authentication configuration
    - paths:
        - /etc/ssh
        - /etc/pam.d
        - /etc/security
        - /etc/nsswitch.conf
      events:
        - all
      recursive: true
      tags:
        control: "SI-7"
        severity: critical
        category: authentication-config

    # AU-2: Audit log integrity
    - paths:
        - /var/log
      events:
        - modify
        - delete
        - create
      recursive: true
      maxDepth: 3
      ignore:
        - "*.gz"
        - "*.old"
        - "*.[0-9]"
      tags:
        control: "AU-2"
        severity: high
        category: audit-logs

    # SI-7: System libraries
    - paths:
        - /usr/lib
        - /lib
        - /lib64
      events:
        - modify
        - create
        - delete
      recursive: true
      maxDepth: 3
      ignore:
        - "*.pyc"
        - "*.cache"
      tags:
        control: "SI-7"
        severity: high
        category: system-libraries

    # SI-7: Kernel and boot
    - paths:
        - /lib/modules
        - /etc/modprobe.d
        - /boot
      events:
        - modify
        - create
        - delete
      recursive: true
      maxDepth: 2
      tags:
        control: "SI-7"
        severity: critical
        category: kernel-boot

  containerRuntime: auto
  paused: false
  logFormat: json
