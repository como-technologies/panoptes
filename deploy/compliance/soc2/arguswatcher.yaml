apiVersion: argus.como-technologies.io/v2
kind: ArgusWatcher
metadata:
  name: soc2-fim
  labels:
    app.kubernetes.io/name: soc2-fim
    app.kubernetes.io/component: fim
    app.kubernetes.io/part-of: panoptes
    compliance: soc2
    panoptes.io/template: soc2-fim
  annotations:
    panoptes.io/description: "SOC 2 File Integrity Monitoring"
    soc2/criteria: "CC7.1, CC7.2, CC7.3"
spec:
  selector:
    matchLabels:
      soc2/scope: "in-scope"

  subjects:
    # CC7.2 - System Monitoring
    - paths:
        - /var/log
      events:
        - modify
        - delete
        - create
      recursive: true
      maxDepth: 5
      ignore:
        - "*.gz"
        - "*.old"
        - "*.[0-9]"
      tags:
        criteria: "CC7.2"
        severity: high
        category: audit-logs

    # CC6.1/CC6.2 - Logical Access Security
    - paths:
        - /etc/passwd
        - /etc/shadow
        - /etc/group
        - /etc/gshadow
        - /etc/sudoers
      events:
        - modify
        - delete
        - create
        - attrib
      tags:
        criteria: "CC6.1"
        severity: critical
        category: user-accounts

    # Access control configuration
    - paths:
        - /etc/sudoers.d
        - /etc/pam.d
        - /etc/security
      events:
        - all
      recursive: true
      tags:
        criteria: "CC6.2"
        severity: critical
        category: access-control

    # CC7.1 - System Operations
    - paths:
        - /usr/bin
        - /usr/sbin
        - /usr/local/bin
        - /bin
        - /sbin
      events:
        - modify
        - create
        - delete
      tags:
        criteria: "CC7.1"
        severity: high
        category: system-binaries

    # SSH and remote access
    - paths:
        - /etc/ssh
        - /root/.ssh
        - /home/*/.ssh
      events:
        - all
      recursive: true
      tags:
        criteria: "CC6.1"
        severity: critical
        category: remote-access

    # System services
    - paths:
        - /etc/systemd/system
        - /etc/init.d
        - /etc/cron.d
        - /etc/crontab
        - /var/spool/cron
      events:
        - all
      recursive: true
      maxDepth: 3
      tags:
        criteria: "CC7.1"
        severity: high
        category: system-services

    # Application configuration
    - paths:
        - /app/config
        - /etc/app
        - /opt/app
      events:
        - modify
        - create
        - delete
      recursive: true
      maxDepth: 3
      tags:
        criteria: "CC7.2"
        severity: medium
        category: app-config

    # SSL/TLS certificates
    - paths:
        - /etc/ssl/certs
        - /etc/ssl/private
        - /etc/pki
      events:
        - all
      recursive: true
      tags:
        criteria: "CC6.1"
        severity: critical
        category: certificates

  containerRuntime: auto
  paused: false
  logFormat: json
