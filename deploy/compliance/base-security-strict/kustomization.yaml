# Strict overlay for base-security compliance template
# Enables enforcing mode (violations are blocked, not just logged)
#
# Usage:
#   kubectl apply -k deploy/compliance/base-security-strict/
#
# WARNING: Test in audit mode first (base-security/) before enabling strict mode.
# Blocked operations will interrupt workloads.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base-security

patches:
  - path: patches/janusguard-strict.yaml
