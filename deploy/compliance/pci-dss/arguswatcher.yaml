apiVersion: argus.como-technologies.io/v2
kind: ArgusWatcher
metadata:
  name: pci-dss-fim
  labels:
    app.kubernetes.io/name: pci-dss-fim
    app.kubernetes.io/component: fim
    app.kubernetes.io/part-of: panoptes
    compliance: pci-dss
    panoptes.io/template: pci-dss-fim
  annotations:
    panoptes.io/description: "PCI-DSS File Integrity Monitoring"
    pci-dss/requirements: "10.5.5, 11.5"
spec:
  selector:
    matchLabels:
      pci-dss/scope: "in-scope"

  subjects:
    # Requirement 10.5.5 - FIM on log files
    - paths:
        - /var/log
      events:
        - modify
        - delete
        - create
        - moved_from
        - moved_to
      recursive: true
      maxDepth: 5
      ignore:
        - "*.gz"
        - "*.old"
        - "*.[0-9]"
      tags:
        requirement: "10.5.5"
        severity: high
        category: log-integrity

    # Requirement 11.5 - Critical system files
    - paths:
        - /etc/passwd
        - /etc/shadow
        - /etc/group
        - /etc/gshadow
        - /etc/sudoers
      events:
        - modify
        - delete
        - attrib
      tags:
        requirement: "11.5"
        severity: critical
        category: user-accounts

    # System configuration files
    - paths:
        - /etc/sudoers.d
        - /etc/pam.d
        - /etc/security
      events:
        - all
      recursive: true
      maxDepth: 2
      tags:
        requirement: "11.5"
        severity: critical
        category: authentication

    # SSH configuration
    - paths:
        - /etc/ssh
        - /root/.ssh
      events:
        - all
      recursive: true
      tags:
        requirement: "11.5"
        severity: critical
        category: ssh-config

    # System binaries
    - paths:
        - /usr/bin
        - /usr/sbin
        - /usr/local/bin
        - /usr/local/sbin
      events:
        - modify
        - create
        - delete
      tags:
        requirement: "11.5"
        severity: high
        category: system-binaries

    # Init and service configuration
    - paths:
        - /etc/systemd
        - /etc/init.d
        - /etc/cron.d
        - /etc/crontab
      events:
        - all
      recursive: true
      maxDepth: 3
      tags:
        requirement: "11.5"
        severity: high
        category: system-services

  containerRuntime: auto
  paused: false
  logFormat: json
