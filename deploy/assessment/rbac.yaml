apiVersion: v1
kind: ServiceAccount
metadata:
  name: panoptes-assess
  namespace: panoptes-system
  labels:
    app.kubernetes.io/name: panoptes-assess
    app.kubernetes.io/part-of: panoptes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: panoptes-assess
  labels:
    app.kubernetes.io/name: panoptes-assess
    app.kubernetes.io/part-of: panoptes
rules:
  # Read pods across all namespaces
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list"]
  # Read deployments, replicasets for owner resolution
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list"]
  # Read Panoptes CRDs
  - apiGroups: ["argus.como-technologies.io"]
    resources: ["arguswatchers"]
    verbs: ["get", "list"]
  - apiGroups: ["janus.como-technologies.io"]
    resources: ["janusguards"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: panoptes-assess
  labels:
    app.kubernetes.io/name: panoptes-assess
    app.kubernetes.io/part-of: panoptes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: panoptes-assess
subjects:
  - kind: ServiceAccount
    name: panoptes-assess
    namespace: panoptes-system
