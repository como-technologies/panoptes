# Minimal JanusGuard example (recommended v2 API)
apiVersion: janus.como-technologies.io/v2
kind: JanusGuard
metadata:
  name: basic-guard
  namespace: default
spec:
  selector:
    matchLabels:
      app: myapp
  subjects:
    - deny:
        - /etc/shadow
      events:
        - open
      defaultResponse: audit
