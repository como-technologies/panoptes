# This rule is not used by the project janus-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over janus.como-technologies.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: janus-operator
    app.kubernetes.io/managed-by: kustomize
  name: janusguard-admin-role
rules:
- apiGroups:
  - janus.como-technologies.io
  resources:
  - janusguards
  verbs:
  - '*'
- apiGroups:
  - janus.como-technologies.io
  resources:
  - janusguards/status
  verbs:
  - get
