# Minimal ArgusWatcher example (recommended v2 API)
apiVersion: argus.como-technologies.io/v2
kind: ArgusWatcher
metadata:
  name: basic-watcher
  namespace: default
spec:
  selector:
    matchLabels:
      app: myapp
  subjects:
    - paths:
        - /app/data
      events:
        - modify
        - delete
