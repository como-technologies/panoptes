# This rule is not used by the project argus-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to argus.como-technologies.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: argus-operator
    app.kubernetes.io/managed-by: kustomize
  name: arguswatcher-viewer-role
rules:
- apiGroups:
  - argus.como-technologies.io
  resources:
  - arguswatchers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - argus.como-technologies.io
  resources:
  - arguswatchers/status
  verbs:
  - get
