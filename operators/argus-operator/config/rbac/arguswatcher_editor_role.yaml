# This rule is not used by the project argus-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the argus.como-technologies.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: argus-operator
    app.kubernetes.io/managed-by: kustomize
  name: arguswatcher-editor-role
rules:
- apiGroups:
  - argus.como-technologies.io
  resources:
  - arguswatchers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - argus.como-technologies.io
  resources:
  - arguswatchers/status
  verbs:
  - get
