# This rule is not used by the project argus-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over argus.como-technologies.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: argus-operator
    app.kubernetes.io/managed-by: kustomize
  name: arguswatcher-admin-role
rules:
- apiGroups:
  - argus.como-technologies.io
  resources:
  - arguswatchers
  verbs:
  - '*'
- apiGroups:
  - argus.como-technologies.io
  resources:
  - arguswatchers/status
  verbs:
  - get
