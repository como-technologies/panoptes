# ArgusWatcher for container breakout indicator detection
# Monitors paths commonly used during container escape attempts.
# Each subject is tagged with the corresponding MITRE ATT&CK technique ID.
#
# Proxy watches: Paths like /root/.ssh and /etc/ld.so.preload don't exist in
# most container images. With skipIfMissing omitted (default: false), the daemon
# watches the nearest ancestor directory and automatically promotes to a direct
# watch when the target appears. See the README for a trace-by-trace walkthrough.
apiVersion: argus.como-technologies.io/v2
kind: ArgusWatcher
metadata:
  name: breakout-detection
  labels:
    app.kubernetes.io/name: breakout-detection
    app.kubernetes.io/component: fim
    app.kubernetes.io/part-of: panoptes
  annotations:
    panoptes.como-technologies.io/description: "Container breakout indicator detection with MITRE ATT&CK mapping"
spec:
  selector:
    matchLabels:
      panoptes.como-technologies.io/monitored: "true"

  subjects:
    # ── T1074: Data Staged ───────────────────────────────────────────
    # Attackers stage tools, exploits, and payloads in world-writable
    # directories before executing them.
    - paths:
        - /tmp
        - /dev/shm
      events:
        - create
        - modify
        - delete
      recursive: true
      maxDepth: 3
      ignore:
        - "*.sock"
        - "*.pid"
      skipIfMissing: true  # /tmp and /dev/shm always exist
      tags:
        attack: "T1074"
        severity: high
        category: staging

    # ── T1053.003: Scheduled Task / Cron ─────────────────────────────
    # Cron-based persistence survives container restarts if the cron
    # directories are on a writable layer or mounted volume.
    - paths:
        - /etc/crontab
        - /etc/cron.d
      events:
        - create
        - modify
        - delete
      recursive: true
      maxDepth: 2
      skipIfMissing: true  # cron paths always exist in images that have cron
      tags:
        attack: "T1053.003"
        severity: critical
        category: cron-persistence

    # ── T1098.004: SSH Authorized Keys ───────────────────────────────
    # Injecting SSH keys provides persistent backdoor access. Even in
    # containers, this is a strong breakout indicator because the attacker
    # may be targeting the host SSH service.
    #
    # Proxy watch: /root/.ssh doesn't exist in most container images.
    # The daemon watches /root (nearest ancestor) and promotes to a
    # direct watch when the attacker runs `mkdir -p /root/.ssh`.
    - paths:
        - /root/.ssh
      events:
        - create
        - modify
        - delete
        - attrib
      recursive: true
      # skipIfMissing defaults to false: proxy watch catches directory creation
      tags:
        attack: "T1098.004"
        severity: critical
        category: ssh-keys

    # ── T1574.006: Hijack Execution Flow / LD_PRELOAD ────────────────
    # Modifying ld.so.preload causes every dynamically linked process to
    # load the attacker's shared library. This is a rootkit-level technique.
    #
    # Proxy watch: /etc/ld.so.preload doesn't exist in most container
    # images. The daemon watches /etc and promotes when the file is created.
    - paths:
        - /etc/ld.so.preload
      events:
        - create
        - modify
      # skipIfMissing defaults to false: proxy watch catches file creation
      tags:
        attack: "T1574.006"
        severity: critical
        category: library-injection

    # ── T1136.001: Create Account / Local Account ────────────────────
    # Adding a user with UID 0 to /etc/passwd provides root-equivalent
    # access. Modifying /etc/shadow can reset root password.
    - paths:
        - /etc/passwd
        - /etc/shadow
      events:
        - modify
        - attrib
      skipIfMissing: true  # /etc/passwd and /etc/shadow always exist
      tags:
        attack: "T1136.001"
        severity: critical
        category: account-creation

  containerRuntime: auto
  paused: false
  logFormat: json
