# GitHub Actions workflow for releases
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  release-operators:
    name: Release Operators
    runs-on: ubuntu-latest
    strategy:
      matrix:
        operator: [argus, janus]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push operator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: operators/${{ matrix.operator }}-operator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.operator }}-controller:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ matrix.operator }}-controller:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-daemons:
    name: Release Daemons
    runs-on: ubuntu-latest
    strategy:
      matrix:
        daemon: [argusd, janusd]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push daemon
        uses: docker/build-push-action@v6
        with:
          context: .
          file: daemons/${{ matrix.daemon }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.daemon }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ matrix.daemon }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-dashboard:
    name: Release Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ui/panoptes-eye/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/panoptes-eye:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/panoptes-eye:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-helm:
    name: Release Helm Charts
    runs-on: ubuntu-latest
    needs: [release-operators, release-daemons, release-dashboard]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.1

      - name: Login to GHCR for Helm OCI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package and push Helm charts
        run: |
          mkdir -p dist
          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            # Update chart version to match release
            sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" "$chart/Chart.yaml"
            sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" "$chart/Chart.yaml"
            # Package
            helm package "$chart" --destination dist --version ${{ steps.version.outputs.VERSION }}
            # Push to GHCR OCI registry
            helm push "dist/${chart_name}-${{ steps.version.outputs.VERSION }}.tgz" oci://${{ env.REGISTRY }}/charts
          done

      - name: Upload Helm charts as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts
          path: dist/*.tgz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-operators, release-daemons, release-dashboard, release-helm]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Helm charts
        uses: actions/download-artifact@v4
        with:
          name: helm-charts
          path: dist

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: dist/*.tgz
          generate_release_notes: true
