# GitHub Actions workflow for releases
name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: gcr.io/spectro-images

jobs:
  release-operators:
    name: Release Operators
    runs-on: ubuntu-latest
    strategy:
      matrix:
        operator: [argus, janus]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: operators/${{ matrix.operator }}-operator/go.sum

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GCR
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push operator
        uses: docker/build-push-action@v5
        with:
          context: operators/${{ matrix.operator }}-operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.operator }}-controller:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ matrix.operator }}-controller:latest

  release-daemons:
    name: Release Daemons
    runs-on: ubuntu-latest
    strategy:
      matrix:
        daemon: [argusd, janusd]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GCR
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push daemon
        uses: docker/build-push-action@v5
        with:
          context: daemons/${{ matrix.daemon }}/c
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.daemon }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ matrix.daemon }}:latest

  release-helm:
    name: Release Helm Charts
    runs-on: ubuntu-latest
    needs: [release-operators, release-daemons]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package Helm charts
        run: |
          mkdir -p dist
          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            helm package "$chart" --destination dist --version ${{ steps.version.outputs.VERSION }}
          done

      - name: Upload Helm charts
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts
          path: dist/*.tgz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-operators, release-daemons, release-helm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Helm charts
        uses: actions/download-artifact@v4
        with:
          name: helm-charts
          path: dist

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: dist/*.tgz
          generate_release_notes: true
