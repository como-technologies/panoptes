name: Security

on:
  push:
    branches: [main]
    paths:
      - 'daemons/**'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
  pull_request:
    branches: [main]
    paths:
      - 'daemons/**'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Vulnerability scanning against RustSec Advisory Database
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [argusd, janusd]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit on ${{ matrix.crate }}
        working-directory: daemons/${{ matrix.crate }}
        run: cargo audit --deny warnings

  # License, source, and dependency policy checks
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [argusd, janusd]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run cargo-deny on ${{ matrix.crate }}
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: daemons/${{ matrix.crate }}/Cargo.toml
          log-level: warn
          command: check
          arguments: --all-features

  # Check for unsafe code usage
  unsafe-check:
    name: Unsafe Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked

      - name: Run cargo-geiger
        run: |
          echo "## Unsafe Code Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for crate in argusd janusd; do
            echo "### $crate" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cd daemons/$crate && cargo geiger --all-features 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
            cd ../..
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

  # SBOM generation for supply chain transparency
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        crate: [argusd, janusd]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM for ${{ matrix.crate }}
        working-directory: daemons/${{ matrix.crate }}
        run: cargo cyclonedx --format json > ../../sbom-${{ matrix.crate }}.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.crate }}
          path: sbom-${{ matrix.crate }}.json
          retention-days: 90
