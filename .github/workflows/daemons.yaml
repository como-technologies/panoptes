# GitHub Actions workflow for building daemons
name: Daemons CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths:
      - 'daemons/**'
      - 'proto/**'
      - '.github/workflows/daemons.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'daemons/**'
      - 'proto/**'
      - '.github/workflows/daemons.yaml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  lint-daemons:
    name: Lint ${{ matrix.daemon }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        daemon: [argusd, janusd]
    defaults:
      run:
        working-directory: daemons/${{ matrix.daemon }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemons/${{ matrix.daemon }}

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test-daemons:
    name: Test ${{ matrix.daemon }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        daemon: [argusd, janusd]
    defaults:
      run:
        working-directory: daemons/${{ matrix.daemon }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemons/${{ matrix.daemon }}

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run tests
        run: cargo test

  docker-argusd:
    name: Docker Argusd
    runs-on: ubuntu-latest
    needs: [lint-daemons, test-daemons]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: daemons/argusd/Dockerfile
          # Multi-arch only on release tags; amd64-only on branch pushes
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.REGISTRY }}/argusd:${{ github.sha }}
            ${{ env.REGISTRY }}/argusd:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-janusd:
    name: Docker Janusd
    runs-on: ubuntu-latest
    needs: [lint-daemons, test-daemons]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: daemons/janusd/Dockerfile
          # Multi-arch only on release tags; amd64-only on branch pushes
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.REGISTRY }}/janusd:${{ github.sha }}
            ${{ env.REGISTRY }}/janusd:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
