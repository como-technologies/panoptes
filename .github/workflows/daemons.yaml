# GitHub Actions workflow for building daemons
name: Daemons CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'daemons/**'
      - 'proto/**'
      - '.github/workflows/daemons.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'daemons/**'
      - 'proto/**'
      - '.github/workflows/daemons.yaml'

env:
  REGISTRY: gcr.io/spectro-images

jobs:
  build-argusd-c:
    name: Build Argusd (C)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemons/argusd/c
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgrpc++-dev protobuf-compiler-grpc

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  build-janusd-c:
    name: Build Janusd (C)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemons/janusd/c
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgrpc++-dev protobuf-compiler-grpc

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  build-argusd-rust:
    name: Build Argusd (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemons/argusd/rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --check
        continue-on-error: true

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

  build-janusd-rust:
    name: Build Janusd (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemons/janusd/rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --check
        continue-on-error: true

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

  docker-argusd:
    name: Docker Argusd
    runs-on: ubuntu-latest
    needs: [build-argusd-c]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: daemons/argusd/c
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/argusd:${{ github.sha }}
            ${{ env.REGISTRY }}/argusd:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-janusd:
    name: Docker Janusd
    runs-on: ubuntu-latest
    needs: [build-janusd-c]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: daemons/janusd/c
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/janusd:${{ github.sha }}
            ${{ env.REGISTRY }}/janusd:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
