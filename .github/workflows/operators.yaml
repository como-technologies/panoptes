# GitHub Actions workflow for building and testing operators
name: Operators CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths:
      - 'operators/**'
      - '.github/workflows/operators.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'operators/**'
      - '.github/workflows/operators.yaml'

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: '1.26'
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  test-argus-operator:
    name: Test Argus Operator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operators/argus-operator
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: operators/argus-operator/go.sum

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate proto code
        run: make generate
        working-directory: proto

      - name: Tidy dependencies
        run: go mod tidy

      - name: Run tests
        run: make test

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: operators/argus-operator
          version: v2.10.1

  test-janus-operator:
    name: Test Janus Operator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operators/janus-operator
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: operators/janus-operator/go.sum

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate proto code
        run: make generate
        working-directory: proto

      - name: Tidy dependencies
        run: go mod tidy

      - name: Run tests
        run: make test

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: operators/janus-operator
          version: v2.10.1

  build-argus-operator:
    name: Build Argus Operator
    runs-on: ubuntu-latest
    needs: test-argus-operator
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: operators/argus-operator
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: operators/argus-operator/Dockerfile
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.REGISTRY }}/argus-controller:${{ github.sha }}
            ${{ env.REGISTRY }}/argus-controller:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-janus-operator:
    name: Build Janus Operator
    runs-on: ubuntu-latest
    needs: test-janus-operator
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: operators/janus-operator
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: operators/janus-operator/Dockerfile
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.REGISTRY }}/janus-controller:${{ github.sha }}
            ${{ env.REGISTRY }}/janus-controller:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
