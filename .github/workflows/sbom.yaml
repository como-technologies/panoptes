# Generate SBOM and sign container images on release
name: Supply Chain Security

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  packages: write
  id-token: write  # For cosign keyless signing

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  sign-and-sbom:
    name: Sign Images and Generate SBOM
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        image:
          - argus-controller
          - janus-controller
          - argusd
          - janusd
          - panoptes-eye
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from release
        id: version
        run: |
          # Get the latest release tag
          VERSION=$(gh release view --json tagName -q '.tagName' | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.version.outputs.VERSION }}

      - name: Generate SBOM with syft
        run: |
          syft ${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.version.outputs.VERSION }} \
            -o spdx-json > sbom-${{ matrix.image }}.spdx.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom \
            --sbom sbom-${{ matrix.image }}.spdx.json \
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.version.outputs.VERSION }}

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.spdx.json
