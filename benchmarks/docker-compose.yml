# Docker Compose for C vs Rust Daemon Benchmarking
# Run with: docker compose -f docker-compose.yml up <service>

services:
  # Argus File Integrity Monitoring - C Implementation
  argusd-c:
    build:
      context: ..
      dockerfile: daemons/argusd/Dockerfile.c
    image: panoptes/argusd:c
    container_name: bench-argusd-c
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - DAC_READ_SEARCH
    volumes:
      - bench-data:/data:rw
      - /proc:/host/proc:ro
    ports:
      - "50051:50051"
    command: ["--listen-addr", "0.0.0.0:50051"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
    networks:
      - bench-net

  # Argus File Integrity Monitoring - Rust Implementation
  argusd-rust:
    build:
      context: ..
      dockerfile: daemons/argusd/Dockerfile.rust
    image: panoptes/argusd:rust
    container_name: bench-argusd-rust
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - DAC_READ_SEARCH
    volumes:
      - bench-data:/data:rw
      - /proc:/host/proc:ro
    ports:
      - "50051:50051"
    command: ["--listen-addr", "0.0.0.0:50051"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
    networks:
      - bench-net

  # Janus File Access Auditing - C Implementation
  janusd-c:
    build:
      context: ..
      dockerfile: daemons/janusd/Dockerfile.c
    image: panoptes/janusd:c
    container_name: bench-janusd-c
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - DAC_READ_SEARCH
      - AUDIT_WRITE
    volumes:
      - bench-data:/data:rw
      - /proc:/host/proc:ro
    ports:
      - "50052:50052"
    command: ["--listen-addr", "0.0.0.0:50052"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
    networks:
      - bench-net

  # Janus File Access Auditing - Rust Implementation
  janusd-rust:
    build:
      context: ..
      dockerfile: daemons/janusd/Dockerfile.rust
    image: panoptes/janusd:rust
    container_name: bench-janusd-rust
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - DAC_READ_SEARCH
      - AUDIT_WRITE
    volumes:
      - bench-data:/data:rw
      - /proc:/host/proc:ro
    ports:
      - "50052:50052"
    command: ["--listen-addr", "0.0.0.0:50052"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
    networks:
      - bench-net

  # Event Generator Container (for generating filesystem events)
  event-generator:
    build:
      context: .
      dockerfile: Dockerfile.event-generator
    image: panoptes/event-generator:latest
    container_name: bench-event-generator
    volumes:
      - bench-data:/data:rw
    networks:
      - bench-net
    profiles:
      - tools

networks:
  bench-net:
    driver: bridge

volumes:
  bench-data:
    driver: local
