{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "panoptes-argus.fullname" . }}-daemon
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panoptes-argus.daemon.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "panoptes-argus.daemon.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # gRPC from controller
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              {{- include "panoptes-argus.controller.selectorLabels" . | nindent 14 }}
    # Prometheus metrics scraping
    - ports:
        - port: {{ .Values.observability.prometheus.port }}
          protocol: TCP
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
