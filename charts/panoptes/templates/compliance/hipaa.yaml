{{- if .Values.compliance.hipaa.enabled }}
apiVersion: argus.como-technologies.io/v2
kind: ArgusWatcher
metadata:
  name: {{ include "panoptes.fullname" . }}-hipaa-fim
  namespace: {{ .Values.compliance.hipaa.namespace | default .Release.Namespace }}
  labels:
    {{- include "panoptes.labels" . | nindent 4 }}
    compliance: hipaa
    panoptes.io/template: hipaa-fim
  annotations:
    hipaa/requirements: "164.312(b), 164.312(c)(1), 164.308(a)(1)"
spec:
  selector:
    matchLabels:
      {{- toYaml .Values.compliance.hipaa.podSelector | nindent 6 }}

  subjects:
    # 164.312(c)(1) - Data Integrity
    - paths:
        - /var/log
      events:
        - modify
        - delete
        - create
      recursive: true
      maxDepth: 5
      ignore:
        - "*.gz"
        - "*.old"
      tags:
        requirement: "164.312(c)(1)"
        severity: high
        category: audit-logs

    - paths:
        - /etc/passwd
        - /etc/shadow
        - /etc/group
        - /etc/sudoers
      events:
        - modify
        - delete
        - attrib
      tags:
        requirement: "164.312(d)"
        severity: critical
        category: user-accounts

    - paths:
        - /etc/pam.d
        - /etc/security
        - /etc/nsswitch.conf
      events:
        - all
      recursive: true
      tags:
        requirement: "164.312(d)"
        severity: critical
        category: authentication

    - paths:
        - /app/config
        - /etc/app
        - /opt/app/config
      events:
        - modify
        - create
        - delete
      recursive: true
      maxDepth: 3
      tags:
        requirement: "164.308(a)(1)"
        severity: high
        category: app-config

    - paths:
        - /etc/ssl
        - /etc/pki
        - /app/certs
      events:
        - all
      recursive: true
      tags:
        requirement: "164.312(e)(1)"
        severity: critical
        category: encryption

    - paths:
        - /var/lib/postgresql
        - /var/lib/mysql
        - /etc/postgresql
        - /etc/mysql
      events:
        - modify
        - create
        - delete
      recursive: true
      maxDepth: 3
      ignore:
        - "*.pid"
        - "*.sock"
      tags:
        requirement: "164.312(c)(1)"
        severity: high
        category: database-config

  containerRuntime: auto
  paused: false
  logFormat: json
---
apiVersion: janus.como-technologies.io/v2
kind: JanusGuard
metadata:
  name: {{ include "panoptes.fullname" . }}-hipaa-access
  namespace: {{ .Values.compliance.hipaa.namespace | default .Release.Namespace }}
  labels:
    {{- include "panoptes.labels" . | nindent 4 }}
    compliance: hipaa
    panoptes.io/template: hipaa-access
  annotations:
    hipaa/requirements: "164.312(b), 164.312(d)"
spec:
  selector:
    matchLabels:
      {{- toYaml .Values.compliance.hipaa.podSelector | nindent 6 }}

  subjects:
    # 164.312(b) - Audit Controls
    - allow:
        - /app/data
        - /var/lib/app/data
        - /data
      events:
        - access
        - open
        - modify
      audit: true
      tags:
        requirement: "164.312(b)"
        severity: high
        category: ephi-access

    # 164.312(d) - Person/Entity Authentication
    - deny:
        - /etc/shadow
        - /etc/gshadow
        - /root/.ssh
      allow:
        - /etc/passwd
        - /etc/group
      events:
        - access
        - open
      defaultResponse: deny
      audit: true
      tags:
        requirement: "164.312(d)"
        severity: critical
        category: credential-access

    - deny:
        - /var/run/secrets
      events:
        - access
        - open
      autoAllowOwner: true
      defaultResponse: deny
      audit: true
      tags:
        requirement: "164.312(d)"
        severity: critical
        category: k8s-secrets

    - allow:
        - /backup
        - /export
        - /var/backup
      events:
        - all
      audit: true
      tags:
        requirement: "164.312(b)"
        severity: high
        category: backup-access

  containerRuntime: auto
  enforcing: {{ .Values.compliance.hipaa.enforcing | default false }}
  paused: false
  logFormat: json
{{- end }}
