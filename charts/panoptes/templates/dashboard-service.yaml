{{- if .Values.components.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "panoptes.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panoptes.dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "panoptes.dashboard.selectorLabels" . | nindent 4 }}
{{- end }}
