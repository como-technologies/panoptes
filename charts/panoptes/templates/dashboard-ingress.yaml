{{- if and .Values.components.dashboard.enabled .Values.dashboard.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "panoptes.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panoptes.dashboard.labels" . | nindent 4 }}
spec:
  {{- if .Values.dashboard.ingress.className }}
  ingressClassName: {{ .Values.dashboard.ingress.className }}
  {{- end }}
  {{- if .Values.dashboard.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.dashboard.ingress.host }}
      secretName: {{ .Values.dashboard.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.dashboard.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "panoptes.fullname" . }}-dashboard
                port:
                  name: http
{{- end }}
