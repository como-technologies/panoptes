# kind cluster configuration for Panoptes local development (Pure Linux)
# Full-featured configuration for native Linux environments
#
# Usage: kind create cluster --name panoptes-dev --config hack/kind-config.yaml
#
# For WSL2/Windows environments, use kind-config-wsl.yaml instead.
#
# Copyright 2026 Como Technologies, LTD
# Licensed under Apache License 2.0

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: panoptes-dev

# Multi-node cluster for realistic local testing
nodes:
  - role: control-plane
    # Port mappings for local access (only on control-plane node)
    extraPortMappings:
      # Panoptes Eye UI
      - containerPort: 30080
        hostPort: 3000
        protocol: TCP
      # Prometheus metrics (Argus)
      - containerPort: 30081
        hostPort: 8080
        protocol: TCP
      # Prometheus metrics (Janus)
      - containerPort: 30082
        hostPort: 8081
        protocol: TCP
    # Mount containerd socket and /proc for container runtime detection
    extraMounts:
      - hostPath: /var/run/containerd
        containerPath: /var/run/containerd
        readOnly: true
      - hostPath: /proc
        containerPath: /host/proc
        readOnly: true
    # Kubeadm configuration for daemon requirements
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            allowed-unsafe-sysctls: "net.*"
  - role: worker
    # Mount containerd socket and /proc for daemon access on worker nodes
    extraMounts:
      - hostPath: /var/run/containerd
        containerPath: /var/run/containerd
        readOnly: true
      - hostPath: /proc
        containerPath: /host/proc
        readOnly: true
  - role: worker
    # Mount containerd socket and /proc for daemon access on worker nodes
    extraMounts:
      - hostPath: /var/run/containerd
        containerPath: /var/run/containerd
        readOnly: true
      - hostPath: /proc
        containerPath: /host/proc
        readOnly: true

# Networking configuration
networking:
  # Use default CNI
  disableDefaultCNI: false
  # Pod subnet (default)
  podSubnet: "10.244.0.0/16"
  # Service subnet (default)
  serviceSubnet: "10.96.0.0/12"

# Containerd configuration for local registry support
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      [plugins."io.containerd.grpc.v1.cri".registry.mirrors]
        [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost"]
          endpoint = ["http://localhost:5000"]
