# Panoptes Eye Local Development Deployment
# For use with kind cluster and local-deploy.sh
#
# Usage: kubectl apply -f hack/panoptes-eye-local.yaml

apiVersion: v1
kind: ServiceAccount
metadata:
  name: panoptes-eye
  namespace: panoptes-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: panoptes-eye
rules:
  # Read pods and nodes for discovery and cluster info
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  # Read metrics for resource usage (requires metrics-server)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # Read ArgusWatchers and JanusGuards
  - apiGroups: ["argus.como-technologies.io"]
    resources: ["arguswatchers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["janus.como-technologies.io"]
    resources: ["janusguards"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: panoptes-eye
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: panoptes-eye
subjects:
  - kind: ServiceAccount
    name: panoptes-eye
    namespace: panoptes-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: panoptes-eye
  namespace: panoptes-system
  labels:
    app: panoptes-eye
    app.kubernetes.io/name: panoptes-eye
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: panoptes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: panoptes-eye
  template:
    metadata:
      labels:
        app: panoptes-eye
        app.kubernetes.io/name: panoptes-eye
    spec:
      serviceAccountName: panoptes-eye
      containers:
        - name: panoptes-eye
          image: localhost/panoptes-eye:dev
          imagePullPolicy: Never  # Use local image
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "development"
            - name: NEXT_PUBLIC_API_URL
              value: ""
            # gRPC daemon endpoints for event streaming
            - name: ARGUSD_HOST
              value: "argusd.panoptes-system.svc.cluster.local:50051"
            - name: JANUSD_HOST
              value: "janusd.panoptes-system.svc.cluster.local:50052"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: panoptes-eye
  namespace: panoptes-system
  labels:
    app: panoptes-eye
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  selector:
    app: panoptes-eye
---
# NodePort for kind access (alternative to port-forward)
apiVersion: v1
kind: Service
metadata:
  name: panoptes-eye-nodeport
  namespace: panoptes-system
  labels:
    app: panoptes-eye
spec:
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30080
      protocol: TCP
  selector:
    app: panoptes-eye
