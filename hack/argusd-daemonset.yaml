apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: argusd
  namespace: panoptes-system
  labels:
    app.kubernetes.io/name: argusd
    app.kubernetes.io/component: daemon
    app.kubernetes.io/part-of: panoptes
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: argusd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argusd
        app.kubernetes.io/component: daemon
        app.kubernetes.io/part-of: panoptes
    spec:
      hostPID: true
      containers:
      - name: argusd
        image: localhost/argusd:dev
        imagePullPolicy: Never
        args:
        - --port=50051
        ports:
        - containerPort: 50051
          hostPort: 50051
          name: grpc
          protocol: TCP
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: PANOPTES_CLUSTER_NAME
          value: ""  # Set via Helm values or Spectro Cloud Palette macros
        volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: host-root
        hostPath:
          path: /
      tolerations:
      - operator: Exists
      terminationGracePeriodSeconds: 10
---
# Service for argusd gRPC endpoint
apiVersion: v1
kind: Service
metadata:
  name: argusd
  namespace: panoptes-system
  labels:
    app.kubernetes.io/name: argusd
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
  selector:
    app.kubernetes.io/name: argusd
