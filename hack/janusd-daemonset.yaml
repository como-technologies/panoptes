apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: janusd
  namespace: panoptes-system
  labels:
    app.kubernetes.io/name: janusd
    app.kubernetes.io/component: daemon
    app.kubernetes.io/part-of: panoptes
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: janusd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: janusd
        app.kubernetes.io/component: daemon
        app.kubernetes.io/part-of: panoptes
    spec:
      hostPID: true
      containers:
      - name: janusd
        image: localhost/janusd:dev
        imagePullPolicy: Never
        args:
        - --port=50052
        ports:
        - containerPort: 50052
          hostPort: 50052
          name: grpc
          protocol: TCP
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: host-root
        hostPath:
          path: /
      tolerations:
      - operator: Exists
      terminationGracePeriodSeconds: 10
---
# Service for janusd gRPC endpoint
apiVersion: v1
kind: Service
metadata:
  name: janusd
  namespace: panoptes-system
  labels:
    app.kubernetes.io/name: janusd
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 50052
      targetPort: grpc
      protocol: TCP
  selector:
    app.kubernetes.io/name: janusd
