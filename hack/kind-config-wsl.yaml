# kind cluster configuration for Panoptes local development (WSL2)
# Simplified configuration for Windows Subsystem for Linux 2
#
# Key differences from pure Linux version:
# - No /proc mount (causes issues in WSL2)
# - No kubeadm patches (not needed for WSL2)
#
# WSL2 cgroup v2 fix:
# - SystemdCgroup = true is required for cgroup v2 systems
# - See: https://github.com/kubernetes-sigs/kind/issues/4030
#
# Usage: kind create cluster --name panoptes-dev --config hack/kind-config-wsl.yaml
#
# Copyright 2026 Como Technologies, LTD
# Licensed under Apache License 2.0

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: panoptes-dev

# Multi-node cluster for realistic local testing
nodes:
  - role: control-plane
    # Port mappings for local access (only on control-plane node)
    extraPortMappings:
      # Panoptes Eye UI
      - containerPort: 30080
        hostPort: 3000
        protocol: TCP
      # Prometheus metrics (Argus)
      - containerPort: 30081
        hostPort: 8080
        protocol: TCP
      # Prometheus metrics (Janus)
      - containerPort: 30082
        hostPort: 8081
        protocol: TCP
  - role: worker
  - role: worker

# Networking configuration
networking:
  # Use default CNI
  disableDefaultCNI: false
  # Pod subnet (default)
  podSubnet: "10.244.0.0/16"
  # Service subnet (default)
  serviceSubnet: "10.96.0.0/12"

# Containerd configuration
containerdConfigPatches:
  # Required for cgroup v2 systems (WSL2 uses cgroup v2)
  # Without this, kubelet fails health checks on systemd-based hosts
  - |-
    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
      SystemdCgroup = true
